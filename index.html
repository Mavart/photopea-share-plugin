<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Photopea Share</title>
  <style>
    :root { color-scheme: light; font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    body { margin: 0; padding: 16px; font-size: 14px; line-height: 1.4; background: #f7f8fa; color: #172033; }
    h1 { font-size: 18px; margin: 0 0 12px; }
    label { display: block; margin: 12px 0 6px; font-weight: 600; }
    select, input, button { width: 100%; box-sizing: border-box; font: inherit; border-radius: 10px; }
    select, input { padding: 10px; border: 1px solid #c8ced8; background: #fff; color: #172033; }
    button { padding: 11px 12px; margin-top: 10px; border: 0; cursor: pointer; font-weight: 700; }
    button:disabled { opacity: .5; cursor: not-allowed; }
    .primary { background: #1769e0; color: #fff; }
    .primary:hover { background: #1159c4; }
    .status { margin-top: 12px; padding: 10px; border: 1px solid #dce1e8; border-radius: 10px; background: #fff; color: #354052; white-space: pre-wrap; }
    .hint { opacity: .75; font-size: 12px; margin-top: 10px; }
    .file { font-size: 12px; overflow-wrap: anywhere; }
  </style>
</head>
<body>
  <h1>Condividi immagine</h1>

  <label for="format">Formato</label>
  <select id="format">
    <option value="png">PNG - qualità piena / trasparenza</option>
    <option value="jpg">JPG - leggero</option>
    <option value="webp">WEBP - leggero moderno</option>
  </select>

  <label for="basename">Nome file</label>
  <input id="basename" value="photopea-export" autocomplete="off" />

  <button id="share" class="primary">CONDIVIDI</button>

  <div id="status" class="status">Apri un documento in Photopea, poi premi “CONDIVIDI”.</div>
  <p class="hint">Se la condivisione diretta non è disponibile, il file verrà scaricato automaticamente.</p>

  <script>
    const formats = {
      png:  { spec: 'png',      mime: 'image/png',  ext: 'png'  },
      jpg:  { spec: 'jpg:0.92', mime: 'image/jpeg', ext: 'jpg'  },
      webp: { spec: 'webp:0.92',mime: 'image/webp', ext: 'webp' }
    };

    const $ = (id) => document.getElementById(id);
    let pendingFormat = null;
    let preparedFile = null;

    function setStatus(message) {
      $('status').textContent = message;
    }

    function sanitizeName(name) {
      return (name || 'photopea-export')
        .trim()
        .replace(/\.[a-z0-9]{2,5}$/i, '')
        .replace(/[^a-z0-9-_ ]+/gi, '-')
        .replace(/\s+/g, '-')
        .replace(/-+/g, '-')
        .replace(/^-|-$/g, '') || 'photopea-export';
    }

    function timestamp() {
      const d = new Date();
      const p = (n) => String(n).padStart(2, '0');
      return `${d.getFullYear()}${p(d.getMonth()+1)}${p(d.getDate())}-${p(d.getHours())}${p(d.getMinutes())}`;
    }

    function downloadFile(file) {
      const blobUrl = URL.createObjectURL(file);
      const link = document.createElement('a');
      link.href = blobUrl;
      link.download = file.name;
      document.body.appendChild(link);
      link.click();
      link.remove();
      setTimeout(() => URL.revokeObjectURL(blobUrl), 1000);
    }

    async function setPrepared(file) {
      preparedFile = file;
      setStatus(`Immagine pronta:\n${file.name}\n${Math.round(file.size / 1024)} KB\n\nApro la condivisione...`);
      await sharePreparedFile();
      $('share').disabled = false;
    }

    function currentShareData() {
      return {
        files: [preparedFile],
        title: preparedFile.name,
        text: 'Immagine esportata da Photopea'
      };
    }

    async function sharePreparedFile() {
      if (!preparedFile) return;
      const data = currentShareData();
      try {
        if (navigator.canShare && navigator.canShare(data)) {
          await navigator.share(data);
          setStatus(`Condivisione avviata:\n${preparedFile.name}`);
        } else {
          downloadFile(preparedFile);
          setStatus(`Condivisione diretta non disponibile. File scaricato:\n${preparedFile.name}`);
        }
      } catch (err) {
        if (err && err.name === 'AbortError') {
          setStatus('Condivisione annullata.');
        } else {
          downloadFile(preparedFile);
          setStatus(`Condivisione non disponibile. File scaricato:\n${preparedFile.name}`);
        }
      }
    }

    function prepareFromPhotopea() {
      const selected = $('format').value;
      pendingFormat = formats[selected];
      preparedFile = null;
      $('share').disabled = true;
      setStatus('Esporto da Photopea...');

      // Photopea esegue questo script e invia l’immagine come ArrayBuffer al plugin.
      const script = `
        try {
          app.activeDocument.saveToOE("${pendingFormat.spec}");
        } catch (e) {
          app.echoToOE("PHOTOPEA_SHARE_ERROR:" + e.message);
        }
      `;
      window.parent.postMessage(script, '*');
    }

    window.addEventListener('message', (event) => {
      const data = event.data;

      if (typeof data === 'string') {
        if (data.startsWith('PHOTOPEA_SHARE_ERROR:')) {
          setStatus('Errore Photopea: ' + data.replace('PHOTOPEA_SHARE_ERROR:', ''));
          $('share').disabled = false;
        }
        return;
      }

      if (data instanceof ArrayBuffer) {
        if (!pendingFormat) {
          setStatus('Ho ricevuto un file da Photopea, ma non conosco il formato richiesto. Riprova.');
          return;
        }
        const blob = new Blob([data], { type: pendingFormat.mime });
        const fileName = `${sanitizeName($('basename').value)}-${timestamp()}.${pendingFormat.ext}`;
        const file = new File([blob], fileName, { type: pendingFormat.mime, lastModified: Date.now() });
        setPrepared(file);
      }
    });

    $('share').addEventListener('click', prepareFromPhotopea);
  </script>
</body>
</html>
