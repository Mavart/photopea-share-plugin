<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Photopea Share</title>
  <style>
    :root {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #111827;
      background: #ffffff;
    }
    html, body {
      margin: 0;
      padding: 0;
      background: #ffffff;
      color: #111827;
    }
    body {
      padding: 16px;
      font-size: 14px;
      line-height: 1.45;
    }
    h1 {
      font-size: 22px;
      line-height: 1.2;
      margin: 0 0 14px;
      color: #111827;
    }
    label {
      display: block;
      margin: 14px 0 6px;
      font-weight: 700;
      color: #111827;
    }
    select, button {
      width: 100%;
      box-sizing: border-box;
      font: inherit;
      border-radius: 14px;
    }
    select {
      padding: 12px 14px;
      border: 1px solid #d1d5db;
      background: #ffffff;
      color: #111827;
      outline: none;
    }
    select:focus {
      border-color: #9ca3af;
    }
    button {
      padding: 14px 16px;
      margin-top: 14px;
      border: 0;
      cursor: pointer;
      font-weight: 800;
      font-size: 15px;
    }
    button:disabled {
      opacity: .55;
      cursor: not-allowed;
    }
    .primary {
      background: #111827;
      color: #ffffff;
    }
    .status {
      margin-top: 14px;
      padding: 12px 14px;
      border-radius: 14px;
      background: #f3f4f6;
      color: #111827;
      white-space: pre-wrap;
    }
    .hint {
      color: #4b5563;
      font-size: 12px;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <h1>Share Image</h1>

  <label for="format">Format</label>
  <select id="format">
    <option value="jpg">JPG</option>
    <option value="png">PNG</option>
    <option value="webp">WEBP</option>
  </select>

  <button id="shareNow" class="primary">Share</button>

  <div id="status" class="status"></div>
  <p class="hint">If the browser blocks direct sharing within Photopea, the plugin automatically opens a dedicated window.</p>

  <script>
    const formats = {
      png:  { spec: 'png',       mime: 'image/png',  ext: 'png'  },
      jpg:  { spec: 'jpg:0.92',  mime: 'image/jpeg', ext: 'jpg'  },
      webp: { spec: 'webp:0.92', mime: 'image/webp', ext: 'webp' }
    };

    const $ = (id) => document.getElementById(id);

    let pendingFormat = null;
    let preparedFile = null;
    let pendingAction = null;
    let sharePopup = null;
    let pendingDocumentName = null;

    function setStatus(message) {
      $('status').textContent = message;
    }

    function stripExtension(name) {
      return (name || '').replace(/\.[a-z0-9]{2,8}$/i, '');
    }

    function sanitizeName(name) {
      return (stripExtension(name) || 'photopea-export')
        .trim()
        .replace(/[^a-z0-9-_ ]+/gi, '-')
        .replace(/\s+/g, '-')
        .replace(/-+/g, '-')
        .replace(/^-|-$/g, '') || 'photopea-export';
    }

    function timestamp() {
      const d = new Date();
      const p = (n) => String(n).padStart(2, '0');
      return `${d.getFullYear()}${p(d.getMonth()+1)}${p(d.getDate())}-${p(d.getHours())}${p(d.getMinutes())}`;
    }

    function currentFormat() {
      return formats[$('format').value];
    }

    function resetPrepared() {
      preparedFile = null;
      pendingDocumentName = null;
    }

    function canShareFile(file) {
      const data = { files: [file], title: file.name, text: 'Image exported from Photopea' };
      return !!(navigator.share && (!navigator.canShare || navigator.canShare(data)));
    }

    async function shareFileDirect(file) {
      const data = { files: [file], title: file.name, text: 'Image exported from Photopea' };
      await navigator.share(data);
    }

    function ensurePopup() {
      if (sharePopup && !sharePopup.closed) return sharePopup;
      const popupUrl = new URL('share.html', window.location.href).toString();
      sharePopup = window.open(popupUrl, 'photopea_share_window', 'width=520,height=720');
      return sharePopup;
    }

    function sendFileToPopup() {
      if (sharePopup && !sharePopup.closed && preparedFile) {
        sharePopup.postMessage({ type: 'PHOTOPEA_SHARE_FILE', file: preparedFile, autoShare: true }, window.location.origin);
        return true;
      }
      return false;
    }

    async function startShareFlow() {
      resetPrepared();
      pendingFormat = currentFormat();
      pendingAction = 'share';
      $('shareNow').disabled = true;
      setStatus('Reading the document name and exporting from Photopea...');

      // Apriamo subito il popup con il gesto utente disponibile.
      ensurePopup();

      const script = `
        try {
          app.echoToOE("PHOTOPEA_SHARE_DOCNAME:" + app.activeDocument.name);
          app.activeDocument.saveToOE("${pendingFormat.spec}");
        } catch (e) {
          app.echoToOE("PHOTOPEA_SHARE_ERROR:" + e.message);
        }
      `;
      window.parent.postMessage(script, '*');
    }

    async function onPrepared(file) {
      preparedFile = file;

      if (pendingAction === 'share') {
        setStatus(`Image ready: ${file.name}\nOpening the share menu...`);

        if (canShareFile(file)) {
          try {
            await shareFileDirect(file);
            setStatus(`Sharing started:\n${file.name}`);
            return;
          } catch (err) {
            // fallback popup
          }
        }

        const popup = ensurePopup();
        if (!popup) {
          $('shareNow').disabled = false;
          setStatus(`Image ready: ${file.name}\nThe browser blocked the sharing window. Allow pop-ups and try again.`);
          return;
        }

        sendFileToPopup();
        $('shareNow').disabled = false;
        setStatus(`Image ready: ${file.name}\nIf the share menu does not open immediately, use the button in the pop-up window.`);
        return;
      }

      $('shareNow').disabled = false;
      setStatus(`Image ready:\n${file.name}`);
    }

    window.addEventListener('message', async (event) => {
      const data = event.data;

      if (data === 'PHOTOPEA_SHARE_POPUP_READY') {
        sendFileToPopup();
        return;
      }

      if (typeof data === 'string') {
        if (data.startsWith('PHOTOPEA_SHARE_DOCNAME:')) {
          pendingDocumentName = data.replace('PHOTOPEA_SHARE_DOCNAME:', '') || 'photopea-export';
          setStatus(`Document: ${pendingDocumentName}\nExporting from Photopea...`);
          return;
        }

        if (data.startsWith('PHOTOPEA_SHARE_ERROR:')) {
          $('shareNow').disabled = false;
          setStatus('Photopea error: ' + data.replace('PHOTOPEA_SHARE_ERROR:', ''));
        }
        return;
      }

      if (data instanceof ArrayBuffer) {
        if (!pendingFormat) {
          $('shareNow').disabled = false;
          setStatus('A file was received from Photopea, but the requested format is unknown. Try again.');
          return;
        }

        const blob = new Blob([data], { type: pendingFormat.mime });
        const baseName = sanitizeName(pendingDocumentName || 'photopea-export');
        const fileName = `${baseName}-${timestamp()}.${pendingFormat.ext}`;
        const file = new File([blob], fileName, { type: pendingFormat.mime, lastModified: Date.now() });
        await onPrepared(file);
      }
    });

    $('shareNow').addEventListener('click', startShareFlow);
  </script>
</body>
</html>
