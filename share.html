<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Share Image</title>
  <style>
    :root {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #111827;
      background: #ffffff;
    }
    html, body {
      margin: 0;
      padding: 0;
      background: #ffffff;
      color: #111827;
    }
    body {
      padding: 20px;
      font-size: 15px;
      line-height: 1.45;
    }
    h1 {
      font-size: 22px;
      margin: 0 0 12px;
    }
    button {
      width: 100%;
      box-sizing: border-box;
      font: inherit;
      border-radius: 14px;
      padding: 14px 16px;
      margin-top: 12px;
      border: 0;
      cursor: pointer;
      font-weight: 800;
    }
    button:disabled {
      opacity: .55;
      cursor: not-allowed;
    }
    .primary {
      background: #111827;
      color: #ffffff;
    }
    .secondary {
      background: #e5e7eb;
      color: #111827;
    }
    .status {
      margin-top: 12px;
      padding: 12px 14px;
      border-radius: 14px;
      background: #f3f4f6;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <h1>Share Image</h1>
  <button id="share" class="primary" disabled>Share</button>
  <button id="download" class="secondary" disabled>Download Image</button>
  <div id="status" class="status">Waiting for the file from the Photopea plugin...</div>

  <script>
    const $ = (id) => document.getElementById(id);
    let file = null;
    let blobUrl = null;

    function setStatus(message) {
      $('status').textContent = message;
    }

    function setupDownload() {
      if (blobUrl) URL.revokeObjectURL(blobUrl);
      blobUrl = URL.createObjectURL(file);
      $('download').disabled = false;
      $('download').onclick = () => {
        const a = document.createElement('a');
        a.href = blobUrl;
        a.download = file.name;
        document.body.appendChild(a);
        a.click();
        a.remove();
      };
    }

    async function shareFile() {
      if (!file) return;
      const data = { files: [file], title: file.name, text: 'Image exported from Photopea' };
      try {
        if (navigator.share && (!navigator.canShare || navigator.canShare(data))) {
          await navigator.share(data);
          setStatus(`Sharing started:\n${file.name}`);
        } else {
          setStatus('This browser does not support direct sharing for this file. Use the download option.');
        }
      } catch (err) {
        //setStatus(`Sharing failed: ${err && err.message ? err.message : err}\n\nYou can use the download option as a fallback.`);
      }
    }

    window.addEventListener('message', async (event) => {
      if (event.origin !== window.location.origin) return;
      if (event.data && event.data.type === 'PHOTOPEA_SHARE_FILE' && event.data.file) {
        file = event.data.file;
        $('share').disabled = false;
        setupDownload();
        setStatus(`File ready:\n${file.name}\n${Math.round(file.size / 1024)} KB`);

        if (event.data.autoShare) {
          try {
            await shareFile();
            return;
          } catch (e) {
            // Fallback: keep the button visible.
          }
          setStatus(`File ready:\n${file.name}\n\nPress “Share” if the menu did not open automatically.`);
        }
      }
    });

    $('share').addEventListener('click', shareFile);

    if (window.opener) {
      window.opener.postMessage('PHOTOPEA_SHARE_POPUP_READY', window.location.origin);
    } else {
      setStatus('This window must be opened by the Photopea plugin.');
    }
  </script>
</body>
</html>
